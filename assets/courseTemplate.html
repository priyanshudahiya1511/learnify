<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <title>Course Content</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0f172a;
        color: #f9fafb;
        padding: 20px;
        overflow-x: hidden;
      }

      #content {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .badge {
        display: inline-block;
        background: rgba(99, 102, 241, 0.2);
        color: #6366f1;
        font-size: 12px;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 999px;
      }

      .title {
        font-size: 22px;
        font-weight: 700;
        line-height: 1.4;
      }

      .meta {
        display: flex;
        gap: 16px;
        align-items: center;
      }

      .price {
        color: #6366f1;
        font-weight: 700;
        font-size: 18px;
      }
      .rating {
        color: #f59e0b;
        font-weight: 600;
        font-size: 15px;
      }

      .thumbnail {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 16px;
        display: block;
      }

      .section-title {
        font-size: 16px;
        font-weight: 700;
        color: #f9fafb;
        margin-bottom: 8px;
      }

      .description {
        font-size: 14px;
        line-height: 1.8;
        color: #9ca3af;
      }

      .instructor-card {
        display: flex;
        align-items: center;
        gap: 14px;
        background: #1e293b;
        border-radius: 16px;
        padding: 16px;
      }

      .instructor-card img {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
      }

      .instructor-name {
        font-size: 15px;
        font-weight: 600;
      }
      .instructor-label {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 2px;
      }

      .modules {
        background: #1e293b;
        border-radius: 16px;
        overflow: hidden;
      }

      .module-item {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid #334155;
      }

      .module-item:last-child {
        border-bottom: none;
      }

      .module-num {
        width: 28px;
        height: 28px;
        min-width: 28px;
        background: rgba(99, 102, 241, 0.15);
        color: #6366f1;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
      }

      .module-title {
        font-size: 14px;
        color: #f9fafb;
      }

      .enroll-btn {
        width: 100%;
        padding: 16px;
        background: #6366f1;
        color: white;
        border: none;
        border-radius: 14px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        margin-bottom: 32px;
      }

      .enroll-btn.enrolled {
        background: #22c55e;
      }

      .loading {
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #6b7280;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div id="content">
      <div class="loading">Loading course...</div>
    </div>

    <script>
      const modules = [
        'Introduction & Overview',
        'Core Concepts & Fundamentals',
        'Hands-on Practice',
        'Advanced Topics',
        'Real World Projects',
        'Assessment & Certification',
      ];

      function renderCourse(course) {
        document.getElementById('content').innerHTML = `
          <div class="badge">${course.category}</div>

          <h1 class="title">${course.title}</h1>

          <div class="meta">
            <span class="rating">⭐ ${course.rating}</span>
            <span class="price">$${course.price}</span>
          </div>

          <img class="thumbnail" src="${course.thumbnail}" />

          <div>
            <p class="section-title">About this course</p>
            <p class="description">${course.description}</p>
          </div>

          <div>
            <p class="section-title">Your Instructor</p>
            <div class="instructor-card">
              <img src="${course.instructor.picture}" />
              <div>
                <div class="instructor-name">${course.instructor.name}</div>
                <div class="instructor-label">Course Instructor</div>
              </div>
            </div>
          </div>

          <div>
            <p class="section-title">Course Modules</p>
            <div class="modules">
              ${modules
                .map(
                  (m, i) => `
                <div class="module-item">
                  <div class="module-num">${i + 1}</div>
                  <div class="module-title">${m}</div>
                </div>
              `
                )
                .join('')}
            </div>
          </div>

          <button
            class="enroll-btn ${course.isEnrolled ? 'enrolled' : ''}"
            onclick="notifyNative('enroll')"
            ${course.isEnrolled ? 'disabled' : ''}>
            ${course.isEnrolled ? '✓ Enrolled' : 'Enroll Now'}
          </button>
        `;
      }

      window.addEventListener('message', function (event) {
        try {
          const course = JSON.parse(event.data);
          renderCourse(course);
        } catch (e) {
          console.error('Parse error', e);
        }
      });

      function notifyNative(action) {
        if (window.ReactNativeWebView) {
          window.ReactNativeWebView.postMessage(JSON.stringify({ action }));
        }
      }
    </script>
  </body>
</html>
